   AVLEventoSelecaoTabela                 avlEventoSelecaoTabela                 = 12;
   AVLEventoTrocaSentido                  avlEventoTrocaSentido                  = 13;
   AVLEventoBotaoPanico                   avlEventoBotaoPanico                   = 14;
   AVLEventoEntradaSaidaPonto             avlEventoEntradaSaidaPonto             = 15;
   AVLEventoTerminalDados                 avlEventoTerminalDados                 = 16;
   AVLEventoPassagemTicket                avlEventoPassagemTicket                = 17;
   AVLEventoTabelaParcial                 avlEventoTabelaParcial                 = 18;
   AVLEventoTelemetriaResumoViagem        avlEventoTelemetriaResumoViagem        = 19;
   AVLEventoAceleracaoBrusca              avlEventoAceleracaoBrusca              = 20;
   AVLEventoFreadaBrusca                  avlEventoFreadaBrusca                  = 21;
   AVLEventoEmbreagemExcessiva            avlEventoEmbreagemExcessiva            = 22;
   AVLEventoViagemSemCondutorIdentificado avlEventoViagemSemCondutorIdentificado = 23;
   AVLEventoPortaAberta                   avlEventoPortaAberta                   = 24;
   AVLEventoExcessoVelocidade             avlEventoExcessoVelocidade             = 25;
   AVLEventoExcessoParadoMotorLigado      avlEventoExcessoParadoMotorLigado      = 26;
   AVLEventoIgnicaoLigaDesliga            avlEventoIgnicaoLigaDesliga            = 27;
   AVLEventoMudancaRumo                   avlEventoMudancaRumo                   = 28;
