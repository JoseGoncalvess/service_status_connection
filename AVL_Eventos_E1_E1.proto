   AVLEventoAberturaJornada               avlEventoAberturaJornada               = 3;
   AVLEventoAberturaFechamentoViagem      avlEventoAberturaFechamentoViagem      = 4;
   AVLEventoPassagemCartao                avlEventoPassagemCartao                = 5;
   AVLEventoRecarga                       avlEventoRecarga                       = 6;
   AVLEventoCatraca45Graus                avlEventoCatraca45Graus                = 7;
   AVLEventoLigaDesliga                   avlEventoLigaDesliga                   = 8;
   AVLEventoBloqueioCartao                avlEventoBloqueioCartao                = 9;
   AVLEventoPontoMotorista                avlEventoPontoMotorista                = 10;
