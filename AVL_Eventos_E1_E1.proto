   uint32 count_over_speed      = 9;
   uint32 time_over_speed       = 10;
   uint32 time_banguela         = 11;
   uint32 count_banguela        = 12;
   uint32 time_blue             = 13;
   uint32 count_blue            = 14;
   uint32 time_green            = 15;
   uint32 count_green           = 16;
   uint32 time_extra_eco        = 17;
   uint32 count_extra_eco       = 18;
   uint32 time_yellow           = 19;
   uint32 count_yellow          = 20;
   uint32 time_red              = 21;
   uint32 count_red             = 22;
   uint32 time_stop_engine_on   = 23;
   uint32 count_stop_engine_on  = 24;
   uint32 time_stop_accel       = 25;
   uint32 count_stop_accel      = 26;
   uint32 time_cluth_excess     = 27;
   uint32 count_cluth_excess    = 28;
   uint32 time_engine_off       = 29;
   uint32 count_hard_accel      = 30;
   uint32 count_hard_brake      = 31;
   uint32 time_tolerancia       = 32;
   uint32 time_inercia          = 33;
   fixed32 start_date_hour      = 34; // Data/hora do inicio da coleta dos contadores (Segundos a partir de 01/01/2000)
   fixed32 end_date_hour        = 35; // Data/hora do fim da coleta dos contadores (Segundos a partir de 01/01/2000)
}

